version: 2

sources:
  - name: olist_raw
    description: Raw Olist e-commerce data loaded from CSVs via DuckDB
    tables:
      - name: orders
        description: All customer orders placed on the Olist platform
        meta:
          external_location: "read_csv_auto('data/olist_orders_dataset.csv')"
        columns:
          - name: order_id
            tests:
              - unique
              - not_null
          - name: customer_id
            tests:
              - not_null
          - name: order_status
            tests:
              - not_null

      - name: order_items
        description: Individual items within each order
        meta:
          external_location: "read_csv_auto('data/olist_order_items_dataset.csv')"
        columns:
          - name: order_id
            tests:
              - not_null
          - name: order_item_id
            tests:
              - not_null
          - name: product_id
            tests:
              - not_null
          - name: seller_id
            tests:
              - not_null

      - name: customers
        description: Customer details including location
        meta:
          external_location: "read_csv_auto('data/olist_customers_dataset.csv')"
        columns:
          - name: customer_id
            tests:
              - unique
              - not_null
          - name: customer_unique_id
            tests:
              - not_null

      - name: products
        description: Product catalog with categories
        meta:
          external_location: "read_csv_auto('data/olist_products_dataset.csv')"
        columns:
          - name: product_id
            tests:
              - unique
              - not_null

      - name: payments
        description: Payment transactions per order
        meta:
          external_location: "read_csv_auto('data/olist_order_payments_dataset.csv')"
        columns:
          - name: order_id
            tests:
              - not_null
          - name: payment_sequential
            tests:
              - not_null

      - name: sellers
        description: Seller details and location
        meta:
          external_location: "read_csv_auto('data/olist_sellers_dataset.csv')"
        columns:
          - name: seller_id
            tests:
              - unique
              - not_null

      - name: reviews
        description: Customer reviews per order
        meta:
          external_location: "read_csv_auto('data/olist_order_reviews_dataset.csv')"
        columns:
          - name: review_id
            tests:
              - not_null
          - name: order_id
            tests:
              - not_null

      - name: geolocation
        description: Brazilian zip code geolocation data
        meta:
          external_location: "read_csv_auto('data/olist_geolocation_dataset.csv')"
        columns:
          - name: geolocation_zip_code_prefix
            tests:
              - not_null

      - name: product_category_name_translation
        description: Portuguese to English product category translations
        meta:
          external_location: "read_csv_auto('data/product_category_name_translation.csv')"
        columns:
          - name: product_category_name
            tests:
              - unique
              - not_null